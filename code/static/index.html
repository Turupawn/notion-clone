<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Clone</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Login overlay -->
  <div id="login-overlay" class="login-overlay" style="display:none">
    <div class="login-box">
      <h2>Admin Key</h2>
      <input type="password" id="login-key" placeholder="Enter admin key" autofocus>
      <button id="login-btn">Enter</button>
    </div>
  </div>

  <div class="app" id="app" style="display:none">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Pages</span>
        <button class="sidebar-btn" id="new-page-btn" title="New page">+</button>
      </div>
      <div class="page-list" id="page-list"></div>
    </aside>

    <!-- Main content -->
    <main class="main-content" id="main-content">
      <div id="empty-state" class="empty-state">
        <p>Select a page or create a new one</p>
      </div>
      <div id="page-editor" style="display:none">
        <div class="page-topbar">
          <div class="page-topbar-left">
            <button class="topbar-btn" id="icon-btn" title="Change icon">📄</button>
            <input type="text" id="page-title" class="page-title-input" placeholder="Untitled" spellcheck="false">
          </div>
          <div class="page-topbar-right">
            <button class="topbar-btn" id="share-btn" title="Share">Share</button>
            <button class="topbar-btn" id="comments-btn" title="Comments">💬</button>
            <button class="topbar-btn danger" id="delete-page-btn" title="Delete page">🗑</button>
          </div>
        </div>
        <div class="editor-scroll">
          <div id="blocks-container" class="blocks-container" contenteditable="true" spellcheck="true"></div>
        </div>
      </div>
    </main>

    <!-- Comments sidebar -->
    <aside class="comments-sidebar" id="comments-sidebar" style="display:none">
      <div class="comments-header">
        <span>Comments</span>
        <button class="sidebar-btn" id="close-comments-btn">&times;</button>
      </div>
      <div class="comments-list" id="comments-list"></div>
      <div id="new-comment-box" class="new-comment-box" style="display:none">
        <div class="new-comment-quote" id="new-comment-quote"></div>
        <textarea id="new-comment-input" placeholder="Write a comment..." rows="3"></textarea>
        <div class="new-comment-actions">
          <button id="cancel-comment-btn" class="btn-secondary">Cancel</button>
          <button id="submit-comment-btn" class="btn-primary">Comment</button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Share modal -->
  <div id="share-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3>Share Page</h3>
        <button class="sidebar-btn" id="close-share-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div id="shares-list" class="shares-list"></div>
        <div class="share-form">
          <input type="text" id="share-alias" placeholder="Name (e.g. Juan, Boss)" spellcheck="false">
          <label class="checkbox-label">
            <input type="checkbox" id="share-can-comment" checked> Can comment
          </label>
          <button class="btn-primary" id="create-share-btn">Create Link</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Slash command menu -->
  <div id="slash-menu" class="slash-menu" style="display:none">
    <div class="slash-menu-items" id="slash-menu-items"></div>
  </div>

  <!-- Floating comment button -->
  <button id="floating-comment-btn" class="floating-comment-btn" style="display:none">Comment</button>

  <!-- Drag indicator -->
  <div id="drag-indicator" class="drag-indicator" style="display:none"></div>

  <!-- Hidden file input for images -->
  <input type="file" id="image-upload" accept="image/*" style="display:none">

  <script src="/static/app.js"></script>
</body>
</html>
